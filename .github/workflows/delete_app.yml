name: Manual App Deletion
on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'Enter the BundleID of the app to remove'
        required: true

jobs:
  delete-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential for rebase to work

      - name: Remove App from JSON
        run: |
          TARGET_ID="${{ github.event.inputs.bundle_id }}"
          
          if [ ! -f source.json ]; then
            echo "source.json not found."
            exit 1
          fi

          echo "Removing app with BundleID: $TARGET_ID"
          
          # Use JQ to delete the entry
          jq --arg id "$TARGET_ID" 'del(.apps[] | select(.bundleIdentifier == $id))' source.json > updated.json
          mv updated.json source.json

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add source.json
          git commit -m "Manual Removal: ${{ github.event.inputs.bundle_id }}" || exit 0
          
          # The Secret Sauce: Pull latest changes, put our deletion on top, then push
          git pull --rebase origin main
          git push origin HEAD:main
