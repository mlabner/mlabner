# ... (Step 1 & 2 remain the same) ...

# 2. Capture Asset Links (Improved for your AppIcon60x60@2x.png)
DOWNLOAD_URL=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | test("\\.ipa$"; "i")) | .browser_download_url' | head -n 1)

# This looks for any image, but prioritizes files with "icon" in the name
ICON_URL=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | test("\\.(png|jpg|jpeg)$"; "i")) | .browser_download_url' | grep -i "icon" | head -n 1)

# If the "grep icon" search failed, just grab the first available image
if [ -z "$ICON_URL" ]; then
  ICON_URL=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | test("\\.(png|jpg|jpeg)$"; "i")) | .browser_download_url' | head -n 1)
fi

SIZE=$(echo '${{ toJson(github.event.release.assets) }}' | jq -r '.[] | select(.name | test("\\.ipa$"; "i")) | .size' | head -n 1 || echo "0")

# ... (Step 3, 4, 5 remain the same) ...

# 6. Update or Add App Entry (With the "null" fix we talked about!)
jq --arg id "$TARGET_ID" \
   --arg name "$APP_NAME" \
   --arg ver "$CLEAN_VERSION" \
   --arg url "$DOWNLOAD_URL" \
   --arg icon "${ICON_URL:-}" \
   --arg size "$SIZE" \
   --arg date "$DATE" \
   'if (.apps | any(.bundleIdentifier == $id)) then 
      (.apps[] | select(.bundleIdentifier == $id)) |= (
        .name = $name | 
        .version = $ver | 
        .downloadURL = $url | 
        .size = ($size | tonumber) | 
        .versionDate = $date | 
        .iconURL = (if $icon != "" then $icon else .iconURL end)
      )
    else 
      .apps = [{
        "name": $name,
        "bundleIdentifier": $id,
        "developerName": "mlabner",
        "version": $ver,
        "versionDate": $date,
        "downloadURL": $url,
        "iconURL": (if $icon != "" then $icon else null end),
        "size": ($size | tonumber),
        "tintColor": "007AFF"
      }] + .apps 
    end' source.json > updated.json
